<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ほいコレ就職フェア | ぴったり園診断（スプレッドシート連動Ver）</title>
    <style>
        :root {
            --primary-color: #ff9a9e;
            --secondary-color: #fecfef;
            --text-color: #4a4a4a;
            --accent-color: #ff6b8b;
        }
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background-color: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
            box-sizing: border-box;
            position: relative;
        }
        .logo-area {
            text-align: center;
            margin-bottom: 10px;
        }
        .logo-img {
            max-width: 80%;
            height: auto;
            display: inline-block;
            cursor: default;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        h2 {
            text-align: center;
            color: var(--accent-color);
            font-size: 22px;
            margin-top: 5px;
            margin-bottom: 5px;
        }
        .subtitle {
            text-align: center;
            font-size: 14px;
            color: #777;
            margin-bottom: 25px;
        }
        .question-block {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 16px;
        }
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #f0f0f0;
            border-radius: 10px;
            font-size: 14px;
            color: var(--text-color);
            outline: none;
            transition: border-color 0.3s;
            background-color: #fafafa;
        }
        select:focus {
            border-color: var(--accent-color);
        }
        button.diagnose-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(to right, #ff6b8b, #ff8e53);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 107, 139, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 15px;
        }
        button.diagnose-btn:active {
            transform: scale(0.98);
            box-shadow: 0 2px 5px rgba(255, 107, 139, 0.4);
        }
        #result-area {
            margin-top: 25px;
            padding: 20px;
            border-radius: 15px;
            background-color: #fff0f2;
            border: 2px dashed var(--accent-color);
            display: none;
            white-space: pre-wrap;
        }
        .admin-section {
            margin-top: 30px;
            border-top: 2px dashed #eee;
            padding-top: 15px;
            display: none;
        }
        .admin-panel {
            max-height: 250px;
            overflow-y: auto;
            font-size: 12px;
            background: #f1f2f6;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #ced6e0;
        }
        .admin-grid {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 8px;
            align-items: center;
        }
        .admin-grid input {
            width: 60px;
            padding: 4px;
            border: 1px solid #ccc;
            border-radius: 4px;
            text-align: center;
        }
        .loading-text {
            text-align: center;
            color: #777;
            font-size: 12px;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-area">
        <img src="logo.png" alt="ほいコレ就職フェア" class="logo-img" onclick="countTap()">
    </div>
    <h2>ぴったり園診断</h2>
    <div class="subtitle">大阪市エリア / 27卒学生向け</div>
    <div id="loading-status" class="loading-text">データ読み込み中...</div>

    <div class="question-block">
        <label>① 希望エリアは？</label>
        <select id="area">
            <option value="北部">北部（北・都島・福島・此花・西淀川・淀川・東淀川区）</option>
            <option value="中央・西部">中央・西部（中央・西・港・大正・浪速区）</option>
            <option value="東部">東部（城東・鶴見・旭・東成・生野区）</option>
            <option value="南部">南部（天王寺・阿倍野・住之江・住吉・東住吉・平野・西成区）</option>
            <option value="こだわらない">こだわらない（大阪市内どこでもOK！）</option>
        </select>
    </div>

    <div class="question-block">
        <label>② 通いやすい沿線は？</label>
        <select id="line">
            <option value="御堂筋線">Osaka Metro 御堂筋線</option>
            <option value="谷町線・四つ橋線・堺筋線">Osaka Metro 谷町線・四つ橋線・堺筋線</option>
            <option value="中央線・長堀鶴見緑地線">Osaka Metro 中央線・長堀鶴見緑地線</option>
            <option value="JR大阪環状線">JR 大阪環状線・その他JR線</option>
            <option value="私鉄各線">私鉄各線（阪急・阪神・京阪・近鉄・南海）</option>
            <option value="こだわらない">こだわらない（どの沿線でもOK！）</option>
        </select>
    </div>

    <div class="question-block">
        <label>③ どんなタイプの園がいい？</label>
        <select id="type">
            <option value="のびのび">のびのび系（元気に遊びたい）</option>
            <option value="お勉強">お勉強・教育系（学びもしっかり）</option>
            <option value="小規模">小規模・アットホーム系（じっくり関わりたい）</option>
        </select>
    </div>

    <div class="question-block">
        <label>④ 一番重視することは？</label>
        <select id="priority">
            <option value="人間関係">人間関係・職場の雰囲気</option>
            <option value="お休み">お休み・プライベートの充実</option>
            <option value="研修">研修・サポート体制の充実</option>
        </select>
    </div>

    <button class="diagnose-btn" onclick="runDiagnosis()">あなたにぴったりの園を見つける！</button>

    <div id="result-area"></div>

    <div class="admin-section" id="admin-section">
        <div class="admin-panel">
            <p style="margin:0 0 10px 0; font-weight:bold; color:#2f3542; font-size:13px;">📊 数値設定（スタッフ用）</p>
            <div class="admin-grid" id="admin-grid"></div>
        </div>
    </div>
</div>

<script>
// ⚠️ 【重要】ここにGASで作成した「ウェブアプリのURL」を貼り付けてください
const GAS_API_URL = "https://script.google.com/macros/s/AKfycbyD33abMS80WWmrACn29JTNSowqtXNubnynldqsKbpTWoga57uu9VqeFmtwt3yF0Xmdsw/exec";

let booths = [];
let seatCounts = {};
let lastSelectedNo = null;

// 起動時にスプレッドシートから園のデータを取得する
window.addEventListener('DOMContentLoaded', () => {
    if(GAS_API_URL.includes("ここにGAS")) {
        document.getElementById('loading-status').innerText = "⚠️ API URLが設定されていません。";
        return;
    }
    
    fetch(GAS_API_URL)
        .then(response => response.json())
        .then(data => {
            booths = data;
            // 着座データの初期化と管理パネルの生成
            const grid = document.getElementById('admin-grid');
            grid.innerHTML = "";
            booths.forEach(b => {
                seatCounts[b.no] = b.seats;
                grid.innerHTML += `
                    <div>【ブース${b.no}】 ${b.name} (${b.area})</div>
                    <div><input type="number" id="seat-${b.no}" value="${b.seats}" min="0" onchange="updateSeat(${b.no}, this.value)"> 人</div>
                `;
            });
            document.getElementById('loading-status').style.display = 'none';
        })
        .catch(error => {
            console.error('Error:', error);
            document.getElementById('loading-status').innerText = "データ読み込み失敗。通信環境を確認してください。";
        });
});

// 着座数を変更した際、リアルタイムでスプレッドシートへ送信する
function updateSeat(no, val) {
    const intVal = parseInt(val) || 0;
    seatCounts[no] = intVal;
    
    // バックグラウンドでスプレッドシートに非同期送信
    fetch(GAS_API_URL, {
        method: "POST",
        mode: "no-cors",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ no: no, seats: intVal })
    }).catch(err => console.error("送信失敗:", err));
}

let tapCount = 0;
let tapTimeout;
function countTap() {
    tapCount++;
    clearTimeout(tapTimeout);
    tapTimeout = setTimeout(() => { tapCount = 0; }, 800);
    
    if (tapCount === 3) {
        const section = document.getElementById('admin-section');
        if (section.style.display === 'block') {
            section.style.display = 'none';
        } else {
            section.style.display = 'block';
            section.scrollIntoView({ behavior: 'smooth' });
        }
        tapCount = 0;
    }
}

function runDiagnosis() {
    if (booths.length === 0) {
        alert("データ読み込み中です。少々お待ちください。");
        return;
    }

    const selectedArea = document.getElementById('area').value;
    const selectedLine = document.getElementById('line').value;
    const selectedType = document.getElementById('type').value;
    const selectedPriority = document.getElementById('priority').value;

    let filtered = booths.filter(b => {
        const areaMatch = (selectedArea === "こだわらない" || b.area === selectedArea);
        const lineMatch = (selectedLine === "こだわらない" || b.line === selectedLine);
        return areaMatch && lineMatch && (b.type === selectedType) && (b.priority === selectedPriority);
    });

    if (filtered.length === 0) {
        filtered = booths.filter(b => {
            const areaMatch = (selectedArea === "こだわらない" || b.area === selectedArea);
            const lineMatch = (selectedLine === "こだわらない" || b.line === selectedLine);
            return areaMatch && lineMatch;
        });
    }

    if (filtered.length === 0) {
        filtered = booths.filter(b => selectedArea === "こだわらない" || b.area === selectedArea);
    }

    let minSeat = Infinity;
    filtered.forEach(b => {
        if (seatCounts[b.no] < minSeat) minSeat = seatCounts[b.no];
    });

    let candidates = filtered.filter(b => seatCounts[b.no] === minSeat);

    if (candidates.length > 1 && lastSelectedNo !== null) {
        const sansLast = candidates.filter(b => b.no !== lastSelectedNo);
        if (sansLast.length > 0) candidates = sansLast;
    }

    const finalSelection = candidates[Math.floor(Math.random() * candidates.length)];
    lastSelectedNo = finalSelection.no;

    const resultArea = document.getElementById('result-area');
    resultArea.style.display = 'block';
    resultArea.innerHTML = `🎯 **あなたと相性のいい園はこちら！**
-----------------------------------------
【ブース No.${finalSelection.no}】 ${finalSelection.name}
-----------------------------------------
🌟 **オススメの理由：**
${selectedArea !== "こだわらない" ? `大阪市${selectedArea}エリア・` : ''}${selectedLine !== "こだわらない" ? `${selectedLine}沿線で、` : ''}あなたが希望された「${selectedType}系」の保育と、「${selectedPriority}」を大切にできる環境がバッチリ揃っています！${finalSelection.desc}

👉 **学生さんへ：**
「ぜひブースに行ってみて、戻ってきたら感想を教えてね♪」`;

    resultArea.scrollIntoView({ behavior: 'smooth' });
}
</script>

</body>
</html>
